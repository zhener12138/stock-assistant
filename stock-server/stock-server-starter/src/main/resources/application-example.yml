spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stock_assistant
    driver-class-name: org.postgresql.Driver
    username: stock_user
    password: stock_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

logging:
  level:
    com.stockassistant: DEBUG
